name: bike-alert

on:
  schedule:
    # Every 5 minutes. GitHub often delays this during peak load,
    # so real cadence is more like 5-15 min.
    - cron: "*/5 * * * *"
  workflow_dispatch:  # lets you trigger manually from the Actions tab

# Prevent overlapping runs — if a previous run is still going, skip this one.
concurrency:
  group: bike-alert
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit state JSONs back to the repo

# Opt into Node.js 24 for JS actions (Node 20 is being deprecated by GitHub
# in June 2026). Removes the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one check
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python bike_alert.py --once

      - name: Commit state if changed
        run: |
          # Track all 3 state files: seen_ads (dedup), prices (deal scoring),
          # stats (weekly heartbeat history).
          STATE_FILES="seen_ads.json prices.json stats.json"
          if [[ -n "$(git status --porcelain $STATE_FILES)" ]]; then
            git config user.name  "bike-alert-bot"
            git config user.email "bike-alert-bot@users.noreply.github.com"
            git add $STATE_FILES
            git commit -m "chore: update bot state [skip ci]"
            # Retry push a couple of times in case of concurrent runs
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" || true
              git push && break
              sleep 2
            done
          else
            echo "No state change."
          fi
